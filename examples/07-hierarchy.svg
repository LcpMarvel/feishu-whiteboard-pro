<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 1180">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 4 L0 8 z"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="1680" height="1180" fill="#EAEFF1"/>

  <!-- ===================== TITLE ===================== -->
  <rect x="80" y="44" width="14" height="62" rx="4" fill="#0E6E78"/>
  <text x="112" y="92" font-size="64" font-weight="900" fill="#16202A">Kubernetes 核心对象模型</text>
  <text x="114" y="138" font-size="22" font-weight="500" fill="#46565F">集群容器层级 · 工作负载对象 · 网络与配置存储的关系</text>

  <!-- ===================================================================== -->
  <!-- REGION 1 (FOCAL):  集群容器层  — nested containment                    -->
  <!-- ===================================================================== -->
  <!-- Cluster outer shell -->
  <rect x="80" y="190" width="720" height="650" rx="10" fill="#F7FAFB" stroke="#0E6E78" stroke-width="2.5"/>
  <rect x="80" y="190" width="720" height="56" rx="10" fill="#22323A"/>
  <text x="108" y="227" font-size="26" font-weight="700" fill="#F7FAFB">Cluster</text>
  <text x="772" y="226" font-size="16" font-weight="500" fill="#9FB0B6" text-anchor="end">集群 · 物理容器边界</text>

  <!-- Control Plane band (inside cluster) -->
  <rect x="112" y="274" width="656" height="150" rx="10" fill="#0A4D55"/>
  <text x="136" y="306" font-size="22" font-weight="700" fill="#F7FAFB">Control Plane</text>
  <text x="280" y="305" font-size="16" font-weight="500" fill="#A8D2D6">控制平面 · 集群大脑</text>
  <!-- control-plane component chips -->
  <rect x="136" y="324" width="142" height="78" rx="8" fill="#F7FAFB"/>
  <text x="207" y="356" font-size="18" font-weight="700" fill="#16202A" text-anchor="middle">api-server</text>
  <text x="207" y="382" font-size="15" font-weight="500" fill="#46565F" text-anchor="middle">统一入口</text>
  <rect x="288" y="324" width="142" height="78" rx="8" fill="#F7FAFB"/>
  <text x="359" y="356" font-size="18" font-weight="700" fill="#16202A" text-anchor="middle">scheduler</text>
  <text x="359" y="382" font-size="15" font-weight="500" fill="#46565F" text-anchor="middle">调度</text>
  <rect x="440" y="324" width="166" height="78" rx="8" fill="#F7FAFB"/>
  <text x="523" y="350" font-size="16" font-weight="700" fill="#16202A" text-anchor="middle">controller-mgr</text>
  <text x="523" y="382" font-size="15" font-weight="500" fill="#46565F" text-anchor="middle">控制器</text>
  <rect x="616" y="324" width="128" height="78" rx="8" fill="#F7FAFB"/>
  <text x="680" y="356" font-size="18" font-weight="700" fill="#16202A" text-anchor="middle">etcd</text>
  <text x="680" y="382" font-size="15" font-weight="500" fill="#46565F" text-anchor="middle">状态存储</text>

  <!-- Worker Node (inside cluster) -->
  <rect x="112" y="446" width="656" height="372" rx="10" fill="#33464F"/>
  <text x="136" y="480" font-size="22" font-weight="700" fill="#F7FAFB">Node</text>
  <text x="218" y="479" font-size="16" font-weight="600" fill="#D3DEE3">工作节点 · 运行 Pod</text>
  <!-- node agents -->
  <rect x="528" y="458" width="96" height="34" rx="7" fill="#0A4D55"/>
  <text x="576" y="481" font-size="15" font-weight="700" fill="#F7FAFB" text-anchor="middle">kubelet</text>
  <rect x="632" y="458" width="116" height="34" rx="7" fill="#0A4D55"/>
  <text x="690" y="481" font-size="14" font-weight="700" fill="#F7FAFB" text-anchor="middle">kube-proxy</text>

  <!-- Pod 1 (inside node) -->
  <rect x="136" y="508" width="296" height="288" rx="10" fill="#F7FAFB" stroke="#0E6E78" stroke-width="2"/>
  <rect x="136" y="508" width="296" height="46" rx="10" fill="#0E6E78"/>
  <text x="160" y="539" font-size="20" font-weight="700" fill="#F7FAFB">Pod</text>
  <text x="412" y="538" font-size="15" font-weight="600" fill="#E8F4F5" text-anchor="end">最小调度单元</text>
  <rect x="160" y="578" width="248" height="92" rx="8" fill="#EAEFF1" stroke="#7B8990" stroke-width="1.2"/>
  <text x="284" y="612" font-size="18" font-weight="700" fill="#16202A" text-anchor="middle">Container</text>
  <text x="284" y="638" font-size="15" font-weight="500" fill="#46565F" text-anchor="middle">应用容器</text>
  <rect x="160" y="686" width="248" height="92" rx="8" fill="#EAEFF1" stroke="#7B8990" stroke-width="1.2"/>
  <text x="284" y="720" font-size="18" font-weight="700" fill="#16202A" text-anchor="middle">Container</text>
  <text x="284" y="746" font-size="15" font-weight="500" fill="#46565F" text-anchor="middle">Sidecar</text>

  <!-- Pod 2 (inside node) -->
  <rect x="448" y="508" width="296" height="288" rx="10" fill="#F7FAFB" stroke="#0E6E78" stroke-width="2"/>
  <rect x="448" y="508" width="296" height="46" rx="10" fill="#0E6E78"/>
  <text x="472" y="539" font-size="20" font-weight="700" fill="#F7FAFB">Pod</text>
  <text x="724" y="538" font-size="15" font-weight="600" fill="#E8F4F5" text-anchor="end">共享网络/存储</text>
  <rect x="472" y="578" width="248" height="92" rx="8" fill="#EAEFF1" stroke="#7B8990" stroke-width="1.2"/>
  <text x="596" y="612" font-size="18" font-weight="700" fill="#16202A" text-anchor="middle">Container</text>
  <text x="596" y="638" font-size="15" font-weight="500" fill="#46565F" text-anchor="middle">应用容器</text>
  <rect x="472" y="686" width="248" height="92" rx="8" fill="#EAEFF1" stroke="#7B8990" stroke-width="1.2"/>
  <text x="596" y="720" font-size="18" font-weight="700" fill="#16202A" text-anchor="middle">Volume</text>
  <text x="596" y="746" font-size="15" font-weight="500" fill="#46565F" text-anchor="middle">挂载卷</text>

  <text x="80" y="172" font-size="34" font-weight="700" fill="#0E6E78">集群容器层</text>

  <!-- ===================================================================== -->
  <!-- REGION 2:  工作负载对象                                                 -->
  <!-- ===================================================================== -->
  <text x="848" y="172" font-size="34" font-weight="700" fill="#0E6E78">工作负载对象</text>

  <!-- Deployment -> ReplicaSet -> Pod chain -->
  <rect x="848" y="190" width="752" height="252" rx="10" fill="#F7FAFB" stroke="#7B8990" stroke-width="1.4"/>
  <text x="872" y="226" font-size="22" font-weight="700" fill="#16202A">Deployment 管理链</text>

  <rect x="872" y="250" width="208" height="120" rx="10" fill="#EAEFF1" stroke="#0E6E78" stroke-width="1.5"/>
  <rect x="872" y="250" width="8" height="120" rx="4" fill="#0E6E78"/>
  <text x="980" y="296" font-size="22" font-weight="700" fill="#0A4D55" text-anchor="middle">Deployment</text>
  <text x="980" y="328" font-size="15" font-weight="500" fill="#46565F" text-anchor="middle">声明期望副本</text>

  <rect x="1144" y="250" width="208" height="120" rx="10" fill="#EAEFF1" stroke="#7B8990" stroke-width="1.4"/>
  <rect x="1144" y="250" width="8" height="120" rx="4" fill="#33464F"/>
  <text x="1252" y="296" font-size="21" font-weight="700" fill="#33464F" text-anchor="middle">ReplicaSet</text>
  <text x="1252" y="328" font-size="15" font-weight="500" fill="#46565F" text-anchor="middle">维持副本数</text>

  <rect x="1416" y="250" width="160" height="120" rx="10" fill="#F7FAFB" stroke="#0E6E78" stroke-width="2"/>
  <text x="1496" y="296" font-size="20" font-weight="700" fill="#16202A" text-anchor="middle">Pod</text>
  <text x="1496" y="328" font-size="15" font-weight="500" fill="#46565F" text-anchor="middle">×N 副本</text>

  <text x="1112" y="300" font-size="14" font-weight="600" fill="#0E6E78" text-anchor="middle">创建</text>
  <text x="1384" y="300" font-size="14" font-weight="600" fill="#0E6E78" text-anchor="middle">管理</text>

  <text x="872" y="408" font-size="16" font-weight="500" fill="#46565F">Deployment 管理 ReplicaSet，ReplicaSet 维持一组 Pod 副本</text>

  <!-- other workload controllers -->
  <rect x="848" y="470" width="364" height="110" rx="10" fill="#F7FAFB" stroke="#7B8990" stroke-width="1.4"/>
  <text x="872" y="506" font-size="20" font-weight="700" fill="#16202A">StatefulSet</text>
  <text x="872" y="540" font-size="16" font-weight="500" fill="#46565F">有状态副本 · 稳定网络标识与存储</text>
  <text x="872" y="564" font-size="15" font-weight="500" fill="#7B8990">如数据库、消息队列</text>

  <rect x="1236" y="470" width="364" height="110" rx="10" fill="#F7FAFB" stroke="#7B8990" stroke-width="1.4"/>
  <text x="1260" y="506" font-size="20" font-weight="700" fill="#16202A">DaemonSet</text>
  <text x="1260" y="540" font-size="16" font-weight="500" fill="#46565F">每个 Node 各运行一个 Pod</text>
  <text x="1260" y="564" font-size="15" font-weight="500" fill="#7B8990">如日志/监控采集</text>

  <rect x="848" y="600" width="752" height="110" rx="10" fill="#F7FAFB" stroke="#7B8990" stroke-width="1.4"/>
  <text x="872" y="636" font-size="20" font-weight="700" fill="#16202A">Job / CronJob</text>
  <text x="872" y="670" font-size="16" font-weight="500" fill="#46565F">Job 运行一次性任务直至完成；CronJob 按时间表周期触发 Job</text>
  <text x="872" y="694" font-size="15" font-weight="500" fill="#7B8990">批处理 · 定时任务</text>

  <!-- ===================================================================== -->
  <!-- REGION 3:  网络与暴露 / 配置与存储                                       -->
  <!-- ===================================================================== -->
  <text x="80" y="912" font-size="34" font-weight="700" fill="#0E6E78">网络暴露与配置存储</text>

  <!-- Namespace grouping boundary (dashed-look via tint) wrapping networking block -->
  <rect x="80" y="930" width="900" height="220" rx="10" fill="#F7FAFB" stroke="#0E6E78" stroke-width="2"/>
  <rect x="80" y="930" width="240" height="44" rx="10" fill="#0E6E78"/>
  <text x="104" y="960" font-size="18" font-weight="700" fill="#F7FAFB">Namespace</text>
  <text x="332" y="959" font-size="15" font-weight="500" fill="#46565F">命名空间 · 资源分组与隔离边界</text>

  <!-- Ingress -> Service -> Pods -->
  <rect x="108" y="996" width="180" height="120" rx="10" fill="#EAEFF1" stroke="#7B8990" stroke-width="1.4"/>
  <rect x="108" y="996" width="8" height="120" rx="4" fill="#33464F"/>
  <text x="202" y="1042" font-size="21" font-weight="700" fill="#33464F" text-anchor="middle">Ingress</text>
  <text x="202" y="1074" font-size="15" font-weight="500" fill="#46565F" text-anchor="middle">L7 路由入口</text>

  <rect x="392" y="996" width="220" height="120" rx="10" fill="#EAEFF1" stroke="#0E6E78" stroke-width="1.5"/>
  <rect x="392" y="996" width="8" height="120" rx="4" fill="#0E6E78"/>
  <text x="506" y="1036" font-size="21" font-weight="700" fill="#0A4D55" text-anchor="middle">Service</text>
  <text x="506" y="1066" font-size="15" font-weight="500" fill="#46565F" text-anchor="middle">ClusterIP · NodePort</text>
  <text x="506" y="1090" font-size="15" font-weight="500" fill="#46565F" text-anchor="middle">LoadBalancer</text>

  <rect x="716" y="996" width="240" height="120" rx="10" fill="#F7FAFB" stroke="#0E6E78" stroke-width="2"/>
  <text x="836" y="1042" font-size="20" font-weight="700" fill="#16202A" text-anchor="middle">Pods</text>
  <text x="836" y="1074" font-size="15" font-weight="500" fill="#46565F" text-anchor="middle">通过标签选择器命中</text>

  <text x="340" y="1046" font-size="14" font-weight="600" fill="#17A2AE" text-anchor="middle">路由</text>
  <text x="664" y="1046" font-size="14" font-weight="600" fill="#17A2AE" text-anchor="middle">selector</text>

  <!-- Config & Storage block -->
  <rect x="1012" y="930" width="588" height="220" rx="10" fill="#F7FAFB" stroke="#0E6E78" stroke-width="2"/>
  <rect x="1012" y="930" width="240" height="44" rx="10" fill="#0E6E78"/>
  <text x="1036" y="960" font-size="18" font-weight="700" fill="#F7FAFB">配置与存储</text>
  <text x="1264" y="959" font-size="15" font-weight="500" fill="#46565F">配置注入 · 持久化卷</text>

  <rect x="1036" y="986" width="262" height="64" rx="8" fill="#EAEFF1" stroke="#7B8990" stroke-width="1.2"/>
  <text x="1058" y="1016" font-size="18" font-weight="700" fill="#16202A">ConfigMap</text>
  <text x="1058" y="1040" font-size="15" font-weight="500" fill="#46565F">非敏感配置注入</text>
  <rect x="1314" y="986" width="262" height="64" rx="8" fill="#EAEFF1" stroke="#7B8990" stroke-width="1.2"/>
  <text x="1336" y="1016" font-size="18" font-weight="700" fill="#16202A">Secret</text>
  <text x="1336" y="1040" font-size="15" font-weight="500" fill="#46565F">敏感凭据注入</text>

  <rect x="1036" y="1066" width="262" height="64" rx="8" fill="#0A4D55"/>
  <text x="1062" y="1096" font-size="18" font-weight="700" fill="#F7FAFB">PersistentVolume</text>
  <text x="1062" y="1120" font-size="15" font-weight="600" fill="#CDE7EA">PV · 集群存储资源</text>
  <rect x="1314" y="1066" width="262" height="64" rx="8" fill="#EAEFF1" stroke="#7B8990" stroke-width="1.4"/>
  <rect x="1314" y="1066" width="8" height="64" rx="4" fill="#33464F"/>
  <text x="1340" y="1096" font-size="18" font-weight="700" fill="#33464F">PVClaim</text>
  <text x="1340" y="1120" font-size="15" font-weight="500" fill="#46565F">PVC · 申领并绑定 PV</text>

  <!-- ===================== CONNECTORS ===================== -->
  <!-- Deployment chain (signal teal) -->
  <line x1="1080" y1="310" x2="1144" y2="310" stroke="#17A2AE" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1352" y1="310" x2="1416" y2="310" stroke="#17A2AE" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Ingress -> Service -> Pods -->
  <line x1="288" y1="1056" x2="392" y2="1056" stroke="#17A2AE" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="612" y1="1056" x2="716" y2="1056" stroke="#17A2AE" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- PVC binds PV (double back from PVC to PV) -->
  <line x1="1314" y1="1098" x2="1298" y2="1098" stroke="#17A2AE" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1306" y="1063" font-size="14" font-weight="600" fill="#17A2AE" text-anchor="middle">PVC 绑定 PV</text>

  <!-- ReplicaSet manages Pods that live on the Node (cross-region relation): Pod(workload) conceptually = Pod in Node -->
  <!-- Service selects the workload Pods -->
</svg>
